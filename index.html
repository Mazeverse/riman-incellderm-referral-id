<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIMAN インセルダム 紹介者のユーザー名 | 1021859591</title>
    <meta name="description" content="RIMAN インセルダム(Incellderm)公式会員登録に必要な紹介者のユーザー명(1021859591)를 확인하세요. 리만 재팬 공식몰 가입 안내.">
    
    <!-- Google Fonts: 귀여운 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #fff0f3;
            --accent-color: #ff4d6d;
            --text-color: #5a4a4a;
            --bg-color: #fffafb;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.15);
            text-align: center;
            border: 4px solid var(--soft-pink);
            position: relative;
            overflow: hidden;
        }

        /* 귀여운 장식 요소 */
        .card::before {
            content: '🌸';
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.2rem;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        p.subtitle {
            font-size: 0.9rem;
            margin-bottom: 30px;
            color: #888;
        }

        .id-label {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--primary-pink);
            margin-bottom: 5px;
        }

        .id-box {
            background: var(--soft-pink);
            border: 3px dashed var(--primary-pink);
            border-radius: 20px;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .id-box:active {
            transform: scale(0.95);
        }

        .copy-hint {
            font-size: 0.75rem;
            color: var(--primary-pink);
            margin-top: 8px;
            font-weight: bold;
        }

        .btn-group {
            margin-top: 35px;
        }

        .btn {
            display: block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            transition: background 0.3s;
        }

        .btn:hover {
            background: #ff758f;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #bbb;
            line-height: 1.5;
        }

        /* 알림창 스타일 커스텀 */
        .toast {
            position: fixed;
            bottom: 20px;
            background: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>RIMAN インセルダム<br>紹介者のユーザー名</h1>
        <p class="subtitle">公式会員登録はこちらのIDをご利用ください ✨</p>

        <div class="id-label">紹介者のユーザー名 (ID)</div>
        <div class="id-box" onclick="copyId()">
            1021859591
        </div>
        <p class="copy-hint">👆 タップしてコピー 👆</p>

        <div class="btn-group">
            <a href="https://mall.riman.com/rmnsocial/home?country=JP&lang=ja-JP" target="_blank" class="btn">
                公式サイトで登録する 🎀
            </a>
        </div>

        <div class="footer-text">
            RIMAN JAPAN (リマンジャパン) 公式登録用案内ページ<br>
            Incellderm / Botalab / Lifening
        </div>
    </div>

    <div id="toast" class="toast">コピーしました！ ✨</div>

    <script>
        function copyId() {
            const id = "1021859591";
            navigator.clipboard.writeText(id).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
